  - type: Features
    data:
      - name: Structured Financial Reporting
        description: >-
          XBRL taxonomies enable machine-readable financial statement reporting
          that regulators, investors, and analysts can process programmatically.
      - name: US GAAP Codification
        description: >-
          The FASB ASC provides the single authoritative source of US GAAP
          organized by topic for consistent application across entities.
      - name: International Standards Harmonization
        description: >-
          IFRS provides globally harmonized accounting standards enabling
          cross-border financial comparability in over 140 jurisdictions.
      - name: Real-Time Financial Data Access
        description: >-
          SEC EDGAR XBRL APIs provide real-time access to structured financial
          data from all public company filings as JSON.
      - name: Data Quality Rules
        description: >-
          The Data Quality Committee Rules Taxonomy (DQCRT) provides
          machine-enforceable rules for validating XBRL-tagged financial data.
      - name: Taxonomy Versioning
        description: >-
          Annual FASB taxonomy releases incorporate new accounting standards and
          ensure accurate representation of current GAAP requirements.
  - type: UseCases
    data:
      - name: Public Company Financial Reporting
        description: >-
          Companies use XBRL taxonomies when filing 10-K, 10-Q, and 8-K reports
          with the SEC, ensuring structured, machine-readable disclosure.
      - name: Financial Data Analysis
        description: >-
          Investors and analysts use SEC EDGAR XBRL APIs to retrieve structured
          financial statements for quantitative analysis and screening.
      - name: Accounting Research
        description: >-
          CPAs and finance professionals use the FASB ASC to research applicable
          US GAAP guidance for specific transaction types and disclosures.
      - name: Regulatory Compliance
        description: >-
          Finance teams implement GAAP or IFRS accounting standards to meet
          regulatory requirements and auditor expectations.
      - name: FinTech Integration
        description: >-
          FinTech platforms integrate with SEC EDGAR APIs to ingest standardized
          financial data for valuation models, credit analysis, and benchmarking.
  - type: Integrations
    data:
      - name: SEC EDGAR
        description: >-
          The SEC's public filing database mandating XBRL for financial
          disclosures, providing free API access to all structured filing data.
      - name: XBRL US
        description: >-
          Industry consortium supporting XBRL adoption in the US, providing
          taxonomy resources, training, and data quality rule development.
      - name: iXBRL (Inline XBRL)
        description: >-
          Human-readable HTML combining with machine-readable XBRL tags, now
          required by the SEC for financial statement filings.
      - name: ESMA / European Reporting
        description: >-
          European Securities and Markets Authority mandating IFRS XBRL
          reporting under the European Single Electronic Format (ESEF).
      - name: Deloitte DART
        description: >-
          Deloitte's Accounting Research Tool providing access to FASB ASC and
          IFRS standards with interpretive guidance and examples.
